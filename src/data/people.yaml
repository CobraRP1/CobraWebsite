        bio: >-
          Rebeca Lazo is a Peruvian international student at the University of Mannheim,
          where she is pursuing a Bachelor's degree in Culture and Economy with a focus
          on Media and Communication Studies and Business Administration. After
          obtaining her bilingual International Baccalaureate Diploma, she briefly
          studied at the University of Lima, where she further deepened her interest in
