intro: >-
  COBRA brings together researchers with expertise in corporate behavior, regulation,
  and empirical economics who share a commitment to understanding how policy shapes
  real-world business decisions.

groups:
  - title: Core Team
    image: /assets/people-core-team.jpg
    intro: null
    members:
      - name: Marcel Olbert
        role: Founding and Academic Director
        affiliation: University of Mannheim
        photo: null
        url: https://marcelolbert.com
        email: null
        bio: >-
          Marcel Olbert is Professor of Taxation, Accounting, and Finance at the
          University of Mannheim. His research examines how corporate taxation and
          disclosure regulation shape firms' decisions, with a focus on multinational
          companies and global capital allocation. Marcel regularly publishes in the
          leading academic journals, has several editorial roles, and is a senior
          research associate at ZEW and Principal Investigator of the DFG-funded
          Collaborative Research Center TRR 266 "Accounting for Transparency."
          Previously at London Business School, he was named as one of Poets&Quants
          top 40-under-40 MBA professors. When not in research & teaching mode, Marcel
          gets fulfilling distraction by working out and spending quality time with his
          family consisting of his wife, three daughters, one dog, and three chickens.

      - name: Christian Fischer
        role: Center Manager
        affiliation: Mannheim Business School
        photo: null
        url: null
        email: null
        bio: >-
          As Center Manager at COBRA, Christian Fischer oversees the center's
          operational infrastructure across events, projects, and administrative
          processes, supporting the development and delivery of its programs while
          ensuring smooth day-to-day delivery. He has been with Mannheim Business School
          for over ten years, contributing extensively in various program management
          roles. He holds a BSc in Economics from LMU Munich and previously worked in
          international education and nonprofit contexts. When Christian is not busy
          keeping COBRA running, he enjoys his additional role as Senior Program Manager
          for the Mannheim Master in Management Analytics & AI at Mannheim Business
          School.

      - name: Trias Kolokitha-Schmitz
        role: Launch Director
        affiliation: null
        photo: null
        url: null
        email: null
        bio: >-
          Trias Kolokitha-Schmitz is Launch Director at COBRA, where she supports the
          center's development and overall positioning. She brings extensive experience
          in research strategy and governance, grant and portfolio management, and
          international collaboration through her work at London Business School. Trias
          holds a Dr. phil. and an MA from Leibniz Universität Hannover. She lives in
          London with her husband, teenage son, and Italian Volpino. Alongside her role
          in institutional strategy, she works as a certified and accredited coach and
          breathwork facilitator, informed by her background in social psychology.

      - name: Sophie Ockert
        role: Project Manager
        affiliation: University of Mannheim
        photo: null
        url: null
        email: null
        bio: >-
          Sophie Ockert holds a Bachelor's degree in Culture and Business Studies, with
          a focus on German Studies and Business Administration, as well as a Master's
          degree in Philosophy and Business Administration from the University of
          Mannheim. During her Master's studies, she specialized in social philosophy.
          Since September 2022, she has been the Area Manager of the Accounting &
          Taxation Area at the University of Mannheim.

  - title: Academic Co-Directors
    image: /assets/people-academic-co-directors.jpg
    intro: >-
      The Center's activities are organized around key thematic pillars coordinated by
      Academic Co-Directors, who provide strategic and operational guidance, help shape
      research activities and events, and disseminate Center resources within their
      respective departments and fields.
    members:
      - name: Oliver Spalt
        role: Academic Co-Director (Finance)
        affiliation: University of Mannheim
        photo: null
        url: https://www.bwl.uni-mannheim.de/en/spalt/team/prof-dr-oliver-spalt/
        email: null
        bio: >-
          Prof. Dr. Oliver G. Spalt is Chair of Financial Markets and Financial
          Institutions at the University of Mannheim and studies how households, firms,
          and investors make financial decisions. He has published in all leading
          finance journals, including the Journal of Finance, the Journal of Financial
          Economics, and the Review of Financial Studies. He is a Research Member of the
          European Corporate Governance Institute (ECGI) and a recipient of the
          prestigious NWO VIDI grant.

      - name: Eckhard Janeba
        role: Academic Co-Director (Economics)
        affiliation: University of Mannheim
        photo: null
        url: https://www.eckhardjaneba.eu/
        email: null
        bio: >-
          Prof. Dr. Eckhard Janeba is Chair of Public Finance and Economic Policy at the
          University of Mannheim and specializes in public economics and international
          taxation. His research focuses on tax competition and the effects of
          globalization on fiscal policy, and he serves as Chair of the Academic
          Advisory Board to Germany's Federal Ministry for Economic Affairs and Climate
          Action.

      - name: Barbara Stage
        role: Academic Co-Director (Taxation)
        affiliation: WHU – Otto Beisheim School of Management
        photo: null
        url: https://sites.google.com/view/barbarastage
        email: null
        bio: >-
          Prof. Dr. Barbara Stage is Assistant Professor for Financial Accounting and
          Business Taxation at WHU – Otto Beisheim School of Management. Her research
          focuses on corporate taxation and tax transparency, studying how disclosure
          and regulation affect firms' tax planning and behavior.

  - title: Post-Doctoral Researchers
    image: /assets/people-researchers.jpg
    intro: >-
      Early-career researchers supporting the Center's research activities and
      receiving support for their own work.
    members:
      - name: Matti Boie-Wegener
        role: Post-Doctoral Researcher
        affiliation: University of Mannheim
        photo: null
        url: https://www.uni-goettingen.de/de/649541.html
        email: null
        bio: >-
          Dr. Matti Boie-Wegener is currently a post-doctoral researcher in Accounting
          and Taxation at the University of Mannheim. He earned his doctorate in
          Economics from the University of Göttingen and his research focuses on
          corporate taxation and empirical tax policy.

  - title: PhD Researchers
    image: null
    intro: null
    members:
      - name: Johannes Gaul
        role: PhD Researcher
        affiliation: University of Mannheim and ZEW
        photo: null
        url: https://johannesgaul.com/
        email: null
        bio: >-
          Johannes Gaul is a PhD candidate at the University of Mannheim and the ZEW,
          working at the intersection of accounting, taxation, and public economics. His
          research uses new data sources and empirical methods to study responses to
          policy interventions, tax compliance, and economics fraud.

      - name: Jonathan Sattler
        role: PhD Researcher
        affiliation: University of Mannheim
        photo: null
        url: null
        email: null
        bio: >-
          Jonathan Sattler is a PhD candidate at the University of Mannheim, working on
          topics related to sustainability reporting, sustainability regulation, and the
          energy transition. He holds a Bachelor's degree in Industrial Engineering from
          THM Gießen and a Master's degree in Management from the University of
          Mannheim. In his research, he also collaborates with Marcel Olbert to study
          how regulatory frameworks and reporting practices shape corporate behavior in
          the context of sustainability and energy transformation.

      - name: Carolina Grande
        role: PhD Researcher
        affiliation: University of Mannheim
        photo: null
        url: https://www.linkedin.com/in/carolina-grande/
        email: null
        bio: >-
          Carolina Grande holds a Master's degree in International Development and
          Public Policy from Nova School of Business and Economics (NOVA SBE), a
          postgraduate certificate in Accounting and Tax from the Lisbon School of
          Economics and Management (ISEG), and a Bachelor's degree in Law from the
          University of Lisbon (FDUL). She previously worked in tax and fiscal policy
          consulting at Syntesia and PwC Portugal, and as a research assistant at
          NOVAFRICA in Mozambique. Her previous work focused on taxation, fiscal policy,
          and public economics. She will join the Taxation Track at the Center for
          Doctoral Studies in Business at GESS in September 2026.

