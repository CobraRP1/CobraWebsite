  - date: 2026-05 # sessions took place May 20 and May 26, 2026
    title: AI & Code Clinic for Research and Teaching
    body: >-
      In May, COBRA hosted the first edition of its AI and Code Clinic for Research and
      Teaching, two workshops designed for faculty and researchers interested in the use
      of AI in empirical research. Across two sessions, participants explored how AI
      agents such as Claude Code can support the research process, discussed practical
      applications and common pitfalls, and were introduced to new data infrastructure
      for the research community. The series offered a hands-on forum for learning,
      exchange, and experimentation, reflecting COBRA's commitment to advancing
      innovative and methodologically rigorous research.
    link: /events/
    images: []
    credit: null

  - date: null # TODO(Cobra): the old site gives no date; the call was in March 2026
    title: COBRA Backs Nine New Projects
    body: >-
      Following the launch of its first Call for Proposals in March, COBRA is now
      supporting nine new research projects exploring how economic policy and regulation
      shape business, markets, and society. The funded projects reflect COBRA's ambition
      to advance innovative, high-impact research with clear relevance for policy,
      business, and public debate. Support will enable researchers to access data,
      collaborate with external research assistants, and take part in conferences,
      fieldwork, and research visits. Together, these projects offer an early glimpse of
      the research energy and real-world relevance at the heart of COBRA.
    link: null
    images: []
    credit: null
