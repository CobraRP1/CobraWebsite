    title: COBRA Soft Launch – June 9, 2026
    body: >-
      A first look back at the event. Faculty, researchers, and members of the MBS
      community gathered to mark the official start of COBRA and its research agenda on
      regulation, taxation, and corporate behavior. More updates on projects and events
      to follow.
