    note: fully booked
    description: >-
      In July, COBRA will host its first Summer School on Empirical Tax Research,
      bringing together PhD students and early-career scholars for an intensive academic
      program focused on current questions and methods in taxation research. The program
      combines methodological training, exposure to frontier research, and discussions
      of tax systems as empirical settings, while also creating space for exchange,
      networking, and participants' own research development.


      Through lectures, research pitches, and feedback sessions, the Summer School will
