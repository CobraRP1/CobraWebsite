# Business page. Content migrated verbatim from the old site's "COBRA Business" page.

title: Research Insights for Business Decision-Making

intro: >-
  COBRA works with businesses seeking insights into how regulation, taxation,
  disclosure requirements, sustainability policy, and financial markets shape corporate
  decision-making. By connecting academic expertise with real-world business
  challenges, the center provides research-driven insights into how firms respond to
  changing regulatory and economic environments. Our work supports dialogue between
  academia and industry, helping organisations better understand emerging policy
  developments, market trends, and the broader economic implications of regulation and
  disclosure.

insights:
  title: Business Insights
  paragraphs:
    - >-
      Businesses today operate in an increasingly complex environment shaped by
      regulation, sustainability requirements, disclosure expectations, taxation, and
      changing financial markets. Understanding how these developments influence firms,
      investors, and corporate decision-making is critical for navigating emerging
      risks, challenges, and strategic opportunities.
    - >-
      Explore research-driven perspectives on current developments in regulation,
      sustainability, disclosure, taxation, and financial markets.
  listLabel: "Businesses can find:"
  items:
    - Latest research insights
    - Commentary on emerging regulatory developments
    - Perspectives on disclosure and transparency requirements
    - Analysis of taxation and multinational business issues
    - Event highlights and conference takeaways
    - Research explainers relevant to business practice and strategy
    - And much more

collaborate:
  title: Collaborate with COBRA
  paragraphs:
    - >-
      COBRA collaborates with businesses, institutions, and organisations to connect
      cutting-edge academic research with real-world business and policy challenges.
      Through research partnerships, expert dialogue, workshops, and events, we foster
      exchange between academia, industry, and policy communities.
    - >-
      We welcome opportunities to engage with organisations interested in emerging
      regulatory developments, evidence-based insights, and forward-looking research
      collaboration.
  listLabel: "Collaboration opportunities:"
  items:
    - Research partnerships and collaborative projects
    - Conferences, seminars and networking events
    - Knowledge exchange initiatives
    - Access to academic expertise and emerging research talent
