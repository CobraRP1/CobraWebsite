title: Evidence in Public Debate

intro: >-
  COBRA contributes to public conversations on regulation, taxation, sustainability,
  disclosure, financial markets, and corporate behavior through research insights,
  expert commentary, and engagement with media, policy, and industry audiences. The
  section brings together media coverage, expert perspectives, and accessible
  research-driven analysis connecting academic research with current economic and
  regulatory developments.

